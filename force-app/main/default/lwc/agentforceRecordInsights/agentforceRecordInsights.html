<template>
    <lightning-card>
        <div class={customHeaderClass} lwc:ref="header">
            <div class="header-title-row">
                <img src={agentforceIcon} alt="Agentforce" class="agentforce-card-icon" />
                <span class="header-title-text">{displayCardTitle}</span>
            </div>

            <div class="header-actions-row">
                <template lwc:if={showModeSwitcher}>
                    <template lwc:if={useModeMenu}>
                        <lightning-button-menu
                            label={modeMenuLabel}
                            title="Switch mode"
                            alternative-text="Switch between Insights and Compare"
                            icon-name="utility:chevrondown"
                            icon-position="right"
                            variant="border-filled"
                            menu-alignment="right"
                            class="mode-switch-menu"
                            onselect={handleModeSelect}
                        >
                            <lightning-menu-item
                                value="insights"
                                label="Insights"
                                icon-name={insightsMenuItemIcon}
                            ></lightning-menu-item>
                            <lightning-menu-item
                                value="compare"
                                label="Compare"
                                icon-name={compareMenuItemIcon}
                            ></lightning-menu-item>
                        </lightning-button-menu>
                    </template>
                    <template lwc:else>
                        <lightning-button-group>
                            <lightning-button
                                label="Insights"
                                variant={insightsButtonVariant}
                                onclick={handleInsightsMode}
                                icon-name="utility:preview"
                                title="Chat about this record's data"
                            ></lightning-button>
                            <lightning-button
                                label="Compare"
                                variant={compareButtonVariant}
                                onclick={handleCompareMode}
                                icon-name="utility:side_list"
                                title="Compare multiple records side by side"
                            ></lightning-button>
                        </lightning-button-group>
                    </template>
                </template>
                <template lwc:if={showSettingsButton}>
                    <lightning-button-icon
                        icon-name="utility:settings"
                        alternative-text="Toggle context panel"
                        title="Show or hide the context settings panel"
                        onclick={handleToggleContext}
                        variant={contextToggleVariant}
                        size={settingsButtonSize}
                    ></lightning-button-icon>
                </template>
            </div>
        </div>

        <div class="main-container">
            <!-- Insights Mode -->
            <template lwc:if={isInsightsMode}>
                <!-- No record context (app page) -->
                <template lwc:if={showInsightsRecordPicker}>
                    <div class="slds-p-around_medium slds-text-align_center">
                        <lightning-icon icon-name="utility:info" size="small" class="slds-m-bottom_small"></lightning-icon>
                        <p class="slds-text-body_regular slds-m-bottom_medium">
                            Place this component on a record page for automatic context detection, or search for a supported record below.
                        </p>
                        <c-record-picker
                            mode="insights"
                            object-type-options={filteredObjectTypeOptions}
                            selected-object-type={selectedObjectType}
                            object-type-filter={objectTypeFilter}
                            is-loading-object-types={isLoadingObjectTypes}
                            object-type-error={objectTypeError}
                            no-filtered-object-options={noFilteredObjectOptions}
                            selected-records={selectedInsightsRecords}
                            can-search={insightsCanSearch}
                            search-term={searchTerm}
                            search-results={searchResults}
                            search-error={searchError}
                            show-advanced-id-entry="true"
                            manual-record-id={manualRecordId}
                            onobjecttypechange={handleObjectTypeChange}
                            onobjectfilterchange={handleObjectFilterChange}
                            onsearchchange={handleSearchChange}
                            onrecordselect={handleInsightsRecordSelect}
                            onrecordremove={handleInsightsRecordRemove}
                            onmanualidchange={handleManualRecordIdChange}
                            onmanualload={handleLoadManualRecord}
                        ></c-record-picker>
                    </div>
                </template>

                <!-- Has record context -->
                <template lwc:if={hasRecordContext}>
                    <div class={layoutClass}>
                        <template lwc:if={contextPanelOpen}>
                            <div class="context-pane">
                                <c-context-panel
                                    record-id={activeRecordId}
                                    available-context={availableContext}
                                    included-categories={includedCategories}
                                    included-relationships={includedRelationships}
                                    included-fields={includedFields}
                                    field-selection-mode={activeFieldSelectionMode}
                                    included-parent-reference-fields={includedParentReferenceFields}
                                    include-same-object-siblings-through-parents={includeSameObjectSiblingsThroughParents}
                                    parent-sibling-relationship-by-reference-field={parentSiblingRelationshipByReferenceField}
                                    depth={currentDepth}
                                    max-depth-allowed={normalizedMaxDepth}
                                    session-tokens={sessionTokens}
                                    session-credits={sessionCredits}
                                    show-usage-metrics={showUsageMetricsEnabled}
                                    context-status={contextLoadStatus}
                                    context-warning-summary={contextWarningSummary}
                                    context-warning-messages={contextWarningMessages}
                                    hide-context-warnings={hideContextWarningsEnabled}
                                    token-warning-threshold={normalizedPromptWarningThreshold}
                                    oncontextchange={handleContextChange}
                                    onparentcontextchange={handleParentContextChange}
                                    ondepthchange={handleDepthChange}
                                    onfieldselect={handleOpenFieldSelector}
                                ></c-context-panel>
                            </div>
                        </template>
                        <div class="chat-pane">
                            <c-chat-panel
                                record-context-json={recordContextJson}
                                object-api-name={activeObjectApiName}
                                record-name={activeRecordName}
                                mode="insights"
                                storage-key={storageKey}
                                show-model-picker={showModelPickerEnabled}
                                default-model-api-name={defaultModelApiName}
                                show-suggested-prompts={showSuggestedPromptsEnabled}
                                show-inline-usage-status={showInlineUsageStatusEnabled}
                                persist-conversation={persistConversationEnabled}
                                enable-suggested-follow-ups={enableSuggestedFollowUpsEnabled}
                                context-status={contextLoadStatus}
                                context-warning-summary={contextWarningSummary}
                                context-warning-messages={contextWarningMessages}
                                hide-context-warnings={hideContextWarningsEnabled}
                                token-warning-threshold={normalizedPromptWarningThreshold}
                                onusageupdate={handleUsageUpdate}
                            ></c-chat-panel>
                        </div>
                    </div>
                </template>

                <!-- Loading -->
                <template lwc:if={isLoadingContext}>
                    <div class="insights-loading" role="status">
                        <lightning-spinner alternative-text={insightsLoadingTitle} size="medium"></lightning-spinner>
                        <div class="insights-loading-copy">
                            <p class="insights-loading-title">{insightsLoadingTitle}</p>
                            <p class="insights-loading-message">{insightsLoadingMessage}</p>
                            <div class="insights-loading-progress">
                                <span class="insights-loading-phase">{activeInsightsLoadingStep}</span>
                                <div class="insights-loading-dots" aria-hidden="true">
                                    <template for:each={insightsLoadingIndicators} for:item="indicator">
                                        <span key={indicator.id} class={indicator.className}></span>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Error -->
                <template lwc:if={contextError}>
                    <div class="slds-p-around_medium">
                        <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                            <span class="slds-assistive-text">error</span>
                            <h2>{contextError}</h2>
                        </div>
                    </div>
                </template>
            </template>

            <!-- Compare Mode -->
            <template lwc:if={shouldRenderCompareMode}>
                <div class={compareContainerClass}>
                    <c-record-compare
                        record-id={recordId}
                        object-api-name={objectApiName}
                        storage-key={compareStorageKey}
                        show-model-picker={showModelPickerEnabled}
                        default-model-api-name={defaultModelApiName}
                        show-suggested-prompts={showSuggestedPromptsEnabled}
                        show-usage-metrics={showUsageMetricsEnabled}
                        show-inline-usage-status={showInlineUsageStatusEnabled}
                        persist-conversation={persistConversationEnabled}
                        show-suggested-comparison-records={showSuggestedComparisonRecordsEnabled}
                        enable-suggested-follow-ups={enableSuggestedFollowUpsEnabled}
                        default-depth={defaultDepth}
                        max-depth-allowed={normalizedMaxDepth}
                        default-field-categories-csv={defaultFieldCategoriesCsv}
                        default-included-fields-csv={defaultIncludedFieldsCsv}
                        field-selection-mode={fieldSelectionMode}
                        default-relationships-csv={defaultRelationshipsCsv}
                        default-parent-references-csv={defaultParentReferencesCsv}
                        default-same-object-siblings-enabled={defaultSameObjectSiblingsEnabled}
                        max-parent-references-selected={maxParentReferencesSelected}
                        hide-context-warnings={hideContextWarningsEnabled}
                        prompt-warning-threshold-tokens={normalizedPromptWarningThreshold}
                        max-compare-records={normalizedMaxCompareRecords}
                        related-records-per-relationship={normalizedRelatedRecordsPerRelationship}
                        onusageupdate={handleUsageUpdate}
                    ></c-record-compare>
                </div>
            </template>
        </div>
    </lightning-card>

    <!-- Field Selector Modal -->
    <template lwc:if={showFieldSelectorSafe}>
        <c-insights-field-selector
            field-categories={availableContext.fieldCategories}
            included-categories={includedCategories}
            included-fields={includedFields}
            selection-mode={activeFieldSelectionMode}
            oncategorieschange={handleCategoriesChange}
            onfieldselectionchange={handleFieldSelectionChange}
            onclose={handleCloseFieldSelector}
        ></c-insights-field-selector>
    </template>
</template>

<template>
    <div class="compare-wrapper">
        <div class="compare-steps">
            <section class={recordsStepClass}>
                <button class="step-header" onclick={openRecordsStep} type="button">
                    <div class="step-header-main">
                        <span class={recordsStepBadgeClass}>1</span>
                        <div class="step-copy">
                            <span class="step-title">Choose records</span>
                            <span class="step-summary">{recordsStepSummary}</span>
                        </div>
                    </div>
                    <lightning-icon icon-name={recordsStepChevronIcon} size="x-small" class="step-chevron"></lightning-icon>
                </button>

                <template lwc:if={showRecordsStepBody}>
                    <div class="step-body">
                        <c-record-picker
                            mode="compare"
                            show-object-picker={showObjectPicker}
                            object-type-options={filteredObjectTypeOptions}
                            selected-object-type={selectedObjectType}
                            object-type-filter={objectTypeFilter}
                            is-loading-object-types={isLoadingObjectTypes}
                            object-type-error={objectTypeError}
                            no-filtered-object-options={noFilteredObjectOptions}
                            selected-records={selectedRecords}
                            can-search={canSearch}
                            search-term={searchTerm}
                            search-results={searchResults}
                            search-error={searchError}
                            show-suggestions={showSuggestions}
                            is-loading-suggestions={isLoadingSuggestions}
                            suggested-records={suggestedRecords}
                            no-suggestions={noSuggestions}
                            has-reached-selection-limit={hasReachedMaxCompareRecords}
                            selection-limit-message={compareLimitMessage}
                            onobjecttypechange={handleObjectTypeChange}
                            onobjectfilterchange={handleObjectFilterChange}
                            onsearchchange={handleSearchChange}
                            onrecordselect={handleRecordSelect}
                            onrecordremove={handleRemoveRecord}
                        ></c-record-picker>

                        <template lwc:if={showSupportStatus}>
                            <div class="support-status" role="status">
                                <lightning-spinner
                                    alternative-text={supportStatusTitle}
                                    size="small"
                                ></lightning-spinner>
                                <div class="support-status-copy">
                                    <span class="support-status-title">{supportStatusTitle}</span>
                                    <span class="support-status-message">{supportStatusMessage}</span>
                                    <div class="support-status-progress">
                                        <span class="support-status-phase">{activeSupportStatusStep}</span>
                                        <div class="support-status-dots" aria-hidden="true">
                                            <template for:each={supportStatusIndicators} for:item="indicator">
                                                <span key={indicator.id} class={indicator.className}></span>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <template lwc:if={showSelectionActionBar}>
                            <div class="selection-actions">
                                <div class="selection-actions-copy">
                                    <span class="selection-actions-title">{selectionActionTitle}</span>
                                    <span class="selection-actions-message">{selectionActionMessage}</span>
                                </div>
                                <div class="step-footer-actions">
                                    <template lwc:if={showSettingsReviewAction}>
                                        <lightning-button
                                            label="Optional Context Settings"
                                            variant="neutral"
                                            onclick={openSettingsStep}
                                        ></lightning-button>
                                    </template>
                                    <template lwc:if={canCompare}>
                                        <lightning-button
                                            label="Load Comparison"
                                            variant="brand"
                                            onclick={handleLoadComparison}
                                            disabled={isLoadingComparison}
                                        ></lightning-button>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <template lwc:if={isLoadingComparison}>
                            <div class="slds-text-align_center slds-p-around_medium">
                                <lightning-spinner alternative-text="Loading comparison..." size="small"></lightning-spinner>
                                <p class="slds-m-top_small slds-text-color_weak">Loading records for comparison...</p>
                            </div>
                        </template>

                        <template lwc:if={compareError}>
                            <div class="slds-m-top_small">
                                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                                    <span class="slds-assistive-text">error</span>
                                    <h2>{compareError}</h2>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </section>

            <section class={settingsStepClass}>
                <button class="step-header" onclick={openSettingsStep} type="button" disabled={settingsStepDisabled}>
                    <div class="step-header-main">
                        <span class={settingsStepBadgeClass}>2</span>
                        <div class="step-copy">
                            <span class="step-title">Optional context settings</span>
                            <span class="step-summary">{settingsStepSummary}</span>
                        </div>
                    </div>
                    <lightning-icon icon-name={settingsStepChevronIcon} size="x-small" class="step-chevron"></lightning-icon>
                </button>

                <template lwc:if={showSettingsStepBody}>
                    <div class="step-body">
                        <template lwc:if={isLoadingCompareContext}>
                            <div class="slds-text-align_center slds-p-around_medium">
                                <lightning-spinner alternative-text="Loading compare context settings..." size="small"></lightning-spinner>
                                <p class="slds-m-top_small slds-text-color_weak">Loading compare context settings...</p>
                            </div>
                        </template>

                        <template lwc:if={showCompareContextPanel}>
                            <c-context-panel
                                record-id={referenceRecordId}
                                available-context={availableContext}
                                included-categories={includedCategories}
                                included-relationships={includedRelationships}
                                included-fields={includedFields}
                                field-selection-mode={activeFieldSelectionMode}
                                included-parent-reference-fields={includedParentReferenceFields}
                                include-same-object-siblings-through-parents={includeSameObjectSiblingsThroughParents}
                                parent-sibling-relationship-by-reference-field={parentSiblingRelationshipByReferenceField}
                                max-parent-references-selected={normalizedMaxParentReferencesSelected}
                                depth={currentDepth}
                                max-depth-allowed={normalizedMaxDepth}
                                session-tokens={_sessionTokens}
                                session-credits={_sessionCredits}
                                show-usage-metrics={showUsageMetricsEnabled}
                                context-status={contextStatus}
                                context-warning-summary={contextWarningSummary}
                                context-warning-messages={contextWarningMessages}
                                hide-context-warnings={hideContextWarnings}
                                context-token-estimate={compareContextTokenEstimate}
                                token-warning-threshold={normalizedPromptWarningThreshold}
                                oncontextchange={handleContextChange}
                                onparentcontextchange={handleParentContextChange}
                                ondepthchange={handleDepthChange}
                                onfieldselect={handleOpenFieldSelector}
                            ></c-context-panel>
                        </template>

                        <template lwc:if={showCompareContextError}>
                            <div class="compare-settings-error slds-p-around_small">
                                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                                    <span class="slds-assistive-text">error</span>
                                    <h2>{contextWarningSummary}</h2>
                                </div>
                            </div>
                        </template>

                        <div class="step-footer">
                            <lightning-button
                                label="Back to Record Selection"
                                variant="neutral"
                                onclick={openRecordsStep}
                            ></lightning-button>
                            <lightning-button
                                label="Load Comparison"
                                variant="brand"
                                onclick={handleLoadComparison}
                                disabled={isLoadingComparison}
                            ></lightning-button>
                        </div>
                    </div>
                </template>
            </section>

            <section class={chatStepClass}>
                <button class="step-header" onclick={openChatStep} type="button" disabled={chatStepDisabled}>
                    <div class="step-header-main">
                        <span class={chatStepBadgeClass}>3</span>
                        <div class="step-copy">
                            <span class="step-title">Chat</span>
                            <span class="step-summary">{chatStepSummary}</span>
                        </div>
                    </div>
                    <lightning-icon icon-name={chatStepChevronIcon} size="x-small" class="step-chevron"></lightning-icon>
                </button>

                <template lwc:if={showChatStepBody}>
                    <div class="step-body step-body-chat">
                        <template lwc:if={comparisonLoaded}>
                            <div class="compare-chat">
                                <c-chat-panel
                                    comparison-context-json={comparisonContextJson}
                                    object-api-name={activeObjectType}
                                    record-name={comparisonLabel}
                                    mode="compare"
                                    storage-key={storageKey}
                                    show-model-picker={showModelPicker}
                                    default-model-api-name={defaultModelApiName}
                                    show-suggested-prompts={showSuggestedPrompts}
                                    show-inline-usage-status={showInlineUsageStatus}
                                    persist-conversation={persistConversation}
                                    enable-suggested-follow-ups={enableSuggestedFollowUps}
                                    context-status={contextStatus}
                                    context-warning-summary={contextWarningSummary}
                                    context-warning-messages={contextWarningMessages}
                                    hide-context-warnings={hideContextWarnings}
                                    token-warning-threshold={normalizedPromptWarningThreshold}
                                    onusageupdate={handleChatUsageUpdate}
                                ></c-chat-panel>
                            </div>
                        </template>

                        <template lwc:if={showChatPlaceholder}>
                            <div class="chat-placeholder">
                                <p class="chat-placeholder-title">Load a comparison to start chatting.</p>
                                <p class="chat-placeholder-copy">Choose at least 2 records, then load the comparison from Step 1 or Step 2.</p>
                            </div>
                        </template>
                    </div>
                </template>
            </section>
        </div>
    </div>

    <template lwc:if={showFieldSelector}>
        <c-insights-field-selector
            field-categories={availableContext.fieldCategories}
            included-categories={includedCategories}
            included-fields={includedFields}
            selection-mode={activeFieldSelectionMode}
            oncategorieschange={handleCategoriesChange}
            onfieldselectionchange={handleFieldSelectionChange}
            onclose={handleCloseFieldSelector}
        ></c-insights-field-selector>
    </template>
</template>

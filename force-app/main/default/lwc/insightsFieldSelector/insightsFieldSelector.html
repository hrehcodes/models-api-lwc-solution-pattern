<template>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium" aria-modal="true">
        <div class="slds-modal__container">
            <!-- Header -->
            <header class="slds-modal__header">
                <lightning-button-icon
                    icon-name="utility:close"
                    alternative-text="Close"
                    class="slds-modal__close"
                    onclick={handleClose}
                ></lightning-button-icon>
                <h2 class="slds-modal__title">Select Field Categories</h2>
                <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                    Choose which field categories to include in the AI context.
                    Selected: {selectedFieldCount} fields across {selectedCategoryCount} categories.
                </p>
            </header>

            <!-- Body -->
            <div class="slds-modal__content slds-p-around_medium">
                <div class="slds-grid slds-wrap slds-gutters_small">
                    <template for:each={categoriesWithState} for:item="cat">
                        <div key={cat.name} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                            <div class={cat.cardClass}>
                                <div class="category-header slds-p-around_small">
                                    <label class="slds-checkbox slds-checkbox_standalone">
                                        <input
                                            type="checkbox"
                                            checked={cat.isIncluded}
                                            data-category={cat.name}
                                            onchange={handleToggleCategory}
                                        />
                                        <span class="slds-checkbox_faux"></span>
                                    </label>
                                    <div class="slds-m-left_x-small">
                                        <span class="slds-text-title_bold">{cat.label}</span>
                                        <span class="slds-text-color_weak slds-m-left_xx-small">({cat.fieldCount} fields)</span>
                                    </div>
                                </div>

                                <!-- Field list (expandable) -->
                                <template lwc:if={cat.isExpanded}>
                                    <div class="field-list slds-p-horizontal_small slds-p-bottom_small">
                                        <template for:each={cat.fields} for:item="field">
                                            <div key={field.apiName} class="field-item slds-p-vertical_xx-small">
                                                <span class="slds-text-body_small">{field.label}</span>
                                                <span class="slds-text-color_weak slds-text-body_small slds-m-left_xx-small">({field.fieldType})</span>
                                                <template lwc:if={field.helpText}>
                                                    <lightning-helptext content={field.helpText} class="slds-m-left_xx-small"></lightning-helptext>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <div class="slds-p-horizontal_small slds-p-bottom_x-small">
                                    <lightning-button
                                        label={cat.expandLabel}
                                        variant="base"
                                        onclick={handleToggleExpand}
                                        data-category={cat.name}
                                        class="expand-btn"
                                    ></lightning-button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Footer -->
            <footer class="slds-modal__footer">
                <lightning-button label="Cancel" onclick={handleClose}></lightning-button>
                <lightning-button
                    label="Select All"
                    onclick={handleSelectAll}
                    class="slds-m-left_x-small"
                ></lightning-button>
                <lightning-button
                    label="Deselect All"
                    onclick={handleDeselectAll}
                    class="slds-m-left_x-small"
                ></lightning-button>
                <lightning-button
                    label="Apply"
                    variant="brand"
                    onclick={handleApply}
                    class="slds-m-left_x-small"
                ></lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>

<template>
    <div class="record-picker">
        <template lwc:if={showObjectPicker}>
            <lightning-input
                type="search"
                label="Filter Object Types"
                value={objectTypeFilter}
                onchange={handleObjectFilterChange}
                placeholder={objectFilterPlaceholder}
                class="slds-m-bottom_x-small"
            ></lightning-input>
            <lightning-combobox
                label="Object Type"
                value={selectedObjectType}
                options={objectTypeOptions}
                onchange={handleObjectTypeChange}
                placeholder="Select object type..."
                class="slds-m-bottom_small"
                disabled={isLoadingObjectTypes}
            ></lightning-combobox>
            <template lwc:if={isLoadingObjectTypes}>
                <div class="picker-loading" role="status">
                    <lightning-spinner alternative-text={objectTypeLoadingTitle} size="x-small"></lightning-spinner>
                    <div class="picker-loading-copy">
                        <span class="picker-loading-title">{objectTypeLoadingTitle}</span>
                        <span class="picker-loading-message">{objectTypeLoadingMessage}</span>
                        <div class="picker-loading-progress">
                            <span class="picker-loading-phase">{activeObjectTypeLoadingStep}</span>
                            <div class="picker-loading-dots" aria-hidden="true">
                                <template for:each={objectTypeLoadingIndicators} for:item="indicator">
                                    <span key={indicator.id} class={indicator.className}></span>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <template lwc:if={noFilteredObjectOptions}>
                <p class="picker-copy slds-m-bottom_small">No object types match the current filter.</p>
            </template>
        </template>

        <template lwc:if={objectTypeError}>
            <p class="picker-error slds-m-bottom_small">{objectTypeError}</p>
        </template>

        <template lwc:if={hasSelectedRecords}>
            <div class="selected-records selected-records-primary">
                <template for:each={selectedRecords} for:item="rec">
                    <lightning-pill key={rec.id} label={rec.name} onremove={handleRemoveRecord} data-id={rec.id}>
                    </lightning-pill>
                </template>
            </div>
        </template>

        <template lwc:if={canSearch}>
            <div class="search-row slds-m-bottom_small">
                <lightning-input
                    type="search"
                    label="Search Records"
                    value={searchTerm}
                    onchange={handleSearchChange}
                    placeholder={searchPlaceholder}
                    variant="label-hidden"
                    class="search-input"
                ></lightning-input>
            </div>

            <template lwc:if={searchError}>
                <p class="picker-error slds-m-bottom_small">{searchError}</p>
            </template>

            <template lwc:if={showSearchResults}>
                <ul class="search-results slds-m-bottom_small">
                    <template for:each={searchResults} for:item="rec">
                        <li
                            key={rec.id}
                            class="result-item"
                            onclick={handleSelectRecord}
                            data-id={rec.id}
                            data-name={rec.name}
                            data-source="search"
                        >
                            <lightning-icon icon-name="utility:add" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                            <span>{rec.name}</span>
                        </li>
                    </template>
                </ul>
            </template>
        </template>

        <template lwc:if={showSuggestions}>
            <div class="suggested-section">
                <div class="suggested-header slds-m-bottom_xx-small">
                    <span class="slds-text-title_bold slds-text-color_weak">Suggested</span>
                    <lightning-helptext
                        content="Records related to the current record or recently modified records of this type."
                        class="compare-helptext"
                    ></lightning-helptext>
                </div>
                <template lwc:if={isLoadingSuggestions}>
                    <div class="slds-text-align_center slds-p-around_x-small">
                        <lightning-spinner alternative-text="Loading suggestions..." size="x-small"></lightning-spinner>
                    </div>
                </template>
                <template lwc:if={hasSuggestions}>
                    <div class="suggestion-pills">
                        <template for:each={suggestedRecords} for:item="rec">
                            <lightning-pill
                                key={rec.id}
                                label={rec.name}
                                onclick={handleSelectRecord}
                                data-id={rec.id}
                                data-name={rec.name}
                                data-source="suggested"
                                class="suggestion-pill"
                            >
                            </lightning-pill>
                        </template>
                    </div>
                </template>
                <template lwc:if={noSuggestions}>
                    <p class="picker-copy">No related records found.</p>
                </template>
            </div>
        </template>

        <template lwc:if={showAdvancedIdEntry}>
            <div class="manual-entry slds-m-top_small">
                <lightning-button
                    label={manualToggleLabel}
                    variant="base"
                    onclick={handleToggleManualEntry}
                    class="manual-toggle"
                ></lightning-button>

                <template lwc:if={showManualEntrySection}>
                    <div class="manual-entry-body">
                        <lightning-input
                            label="Record ID"
                            value={manualRecordId}
                            onchange={handleManualRecordIdChange}
                            placeholder="Paste a record ID..."
                        ></lightning-input>
                        <lightning-button
                            label="Load Record"
                            variant="neutral"
                            onclick={handleManualLoad}
                            disabled={manualLoadDisabled}
                            class="slds-m-top_small"
                        ></lightning-button>
                    </div>
                </template>
            </div>
        </template>

        <template lwc:if={hasReachedSelectionLimit}>
            <p class="picker-error slds-m-top_x-small">{selectionLimitMessage}</p>
        </template>
    </div>
</template>

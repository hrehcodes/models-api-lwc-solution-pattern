<template>
    <!-- Model Selector (collapsed into bar) -->
    <template lwc:if={showModelBar}>
        <div class="model-bar slds-p-horizontal_small slds-p-vertical_xx-small">
            <template lwc:if={showModelPicker}>
                <lightning-combobox
                    label="Model"
                    value={selectedModel}
                    options={modelOptions}
                    onchange={handleModelChange}
                    variant="label-hidden"
                    class="model-picker"
                ></lightning-combobox>
            </template>
            <template lwc:if={hasMessages}>
                <lightning-button-icon
                    icon-name="utility:clear"
                    alternative-text="Clear conversation"
                    title="Clear conversation"
                    onclick={handleClearConversation}
                    class="slds-m-left_x-small"
                    size="small"
                ></lightning-button-icon>
            </template>
        </div>
    </template>

    <template lwc:if={showContextWarning}>
        <div class={contextWarningClass}>
            <div class="warning-summary">{contextWarningSummary}</div>
            <template lwc:if={contextWarningMessageList.length}>
                <ul class="warning-list">
                    <template for:each={contextWarningMessageList} for:item="warning">
                        <li key={warning}>{warning}</li>
                    </template>
                </ul>
            </template>
        </div>
    </template>

    <!-- Chat Messages -->
    <div class="chat-messages" lwc:ref="chatContainer">
        <template lwc:if={showWelcome}>
            <div class="welcome-container slds-text-align_center slds-p-around_medium">
                <div class="header-with-icon slds-grid slds-grid_vertical-align-center slds-grid_align-center slds-m-bottom_x-small">
                    <img src={agentforceIcon} alt="Agentforce" class="agentforce-header-icon" />
                </div>
                <p class="slds-text-body_regular slds-text-color_weak slds-m-bottom_medium">
                    Ask me anything about <strong>{recordName}</strong>. I can see the fields and related records you've selected in the context panel.
                </p>

                <!-- Suggested Prompts -->
                <template lwc:if={showSuggestedPromptButtons}>
                    <div class="suggested-prompts">
                        <template for:each={suggestedPrompts} for:item="prompt">
                            <lightning-button
                                key={prompt.id}
                                label={prompt.text}
                                onclick={handleSuggestedPrompt}
                                data-prompt={prompt.text}
                                variant="neutral"
                                class="prompt-chip slds-m-around_xx-small"
                            ></lightning-button>
                        </template>
                    </div>
                </template>
            </div>
        </template>

        <template for:each={messages} for:item="msg">
            <div key={msg.id} class={msg.containerClass}>
                <div class={msg.bubbleClass}>
                    <!-- User message -->
                    <template lwc:if={msg.isUser}>
                        <p class="message-text">{msg.text}</p>
                    </template>

                    <!-- Assistant message (with markdown) -->
                    <template lwc:if={msg.isAssistant}>
                        <lightning-formatted-rich-text value={msg.htmlContent} class="message-text"></lightning-formatted-rich-text>
                        <div class="message-actions slds-m-top_xx-small">
                            <lightning-button-icon
                                icon-name="utility:copy_to_clipboard"
                                alternative-text="Copy"
                                title="Copy to clipboard"
                                data-index={msg.index}
                                onclick={handleCopyMessage}
                                size="x-small"
                            ></lightning-button-icon>
                            <template lwc:if={msg.isLastAssistant}>
                                <lightning-button-icon
                                    icon-name="utility:refresh"
                                    alternative-text="Regenerate"
                                    title="Regenerate response"
                                    onclick={handleRegenerate}
                                    size="x-small"
                                    class="slds-m-left_xx-small"
                                ></lightning-button-icon>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Loading indicator -->
        <template lwc:if={isLoading}>
            <div class="message-row assistant-row">
                <div class="message-bubble assistant-bubble loading-bubble">
                    <div class="typing-indicator">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Follow-up Prompts -->
    <template lwc:if={hasFollowUpPrompts}>
        <div class="follow-up-bar slds-p-horizontal_small slds-p-vertical_xx-small">
            <template for:each={followUpPromptsKeyed} for:item="fp">
                <lightning-button
                    key={fp.id}
                    label={fp.text}
                    onclick={handleFollowUpPrompt}
                    data-prompt={fp.text}
                    variant="neutral"
                    class="follow-up-chip slds-m-right_xx-small"
                ></lightning-button>
            </template>
        </div>
    </template>

    <!-- Input Area -->
    <div class="input-area slds-p-around_small">
        <div class="input-row">
            <textarea
                lwc:ref="messageInput"
                class="input-field input-textarea"
                placeholder={inputPlaceholder}
                oninput={handleInputChange}
                onkeydown={handleKeyDown}
                disabled={isLoading}
                rows="2"
                aria-label="Message"
            ></textarea>
            <lightning-button-icon
                icon-name="utility:send"
                alternative-text="Send"
                variant="brand"
                onclick={handleSend}
                disabled={sendDisabled}
                class="send-btn slds-m-left_x-small"
                size="medium"
            ></lightning-button-icon>
        </div>
        <template lwc:if={showInlineUsageStatusEnabled}>
            <div class="usage-status-bar" role="status" aria-live="polite">
                <span class="usage-status-label">Usage</span>
                <span class="usage-status-metric">
                    <strong>{formattedSessionTokens}</strong> session tokens
                </span>
                <span class="usage-status-divider" aria-hidden="true">•</span>
                <span class="usage-status-metric">
                    <strong>{formattedSessionCredits}</strong> flex credits
                </span>
            </div>
        </template>
    </div>

    <template lwc:if={showLargePromptWarningModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-label="Large prompt warning" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Large Prompt Warning</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <p class="slds-m-bottom_small">{largePromptWarningHeading}</p>
                    <p>{largePromptWarningBody}</p>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Cancel"
                        onclick={handleCancelLargePrompt}
                        class="slds-m-right_small"
                    ></lightning-button>
                    <lightning-button
                        label="Send Anyway"
                        variant="brand"
                        onclick={handleContinueLargePrompt}
                    ></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
